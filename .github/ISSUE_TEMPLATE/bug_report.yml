name: Bug Report
description: Report a problem with Alaiy OS to help us fix it
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out the
        sections below so we can reproduce and fix the issue quickly.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I have searched [existing issues](../issues) and this has not been reported yet.
          required: true
        - label: I am running a supported version (Frappe v16 / ERPNext v16).
          required: true
        - label: I have run `bench migrate` and `bench build --app alaiy_os` after installing/updating.
          required: false

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: When I open the Alaiy OS workspace, ...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behaviour.
      placeholder: |
        1. Install the app with `bench --site <site> install-app alaiy_os`
        2. Log in as an `Alaiy OS User`
        3. Navigate to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include full error tracebacks if available.
      render: shell
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or recordings
      description: If applicable, add screenshots or screen recordings to help explain the problem.
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Please provide version details. You can get most of these from `bench version`.
      value: |
        - Alaiy OS version:
        - Frappe version:
        - ERPNext version:
        - Bench version:
        - Python version:
        - Database (MariaDB/Postgres) & version:
        - OS:
        - Browser (if UI-related):
        - Deployment (bench dev / production / docker / FrappeCloud):
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Paste any relevant output from the browser console, `bench --site <site> console`,
        or logs under `frappe-bench/logs/`.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
    validations:
      required: false
