name: Feature Request
description: Suggest an idea or enhancement for Alaiy OS
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe the feature and the
        problem it solves so we can evaluate it.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I have searched [existing issues](../issues) and this has not already been requested.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: Is your feature request related to a problem? Describe what's frustrating or missing.
      placeholder: I'm always frustrated when ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: A clear and concise description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've considered.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of Alaiy OS does this affect?
      multiple: true
      options:
        - Workspace / provisioning (setup/install.py)
        - Roles & permissions
        - Access control / route guard
        - Connectors (os_connector_registry)
        - Theme / branding (os_theme_settings)
        - Onboarding
        - API
        - Documentation
        - Other
    validations:
      required: false

  - type: dropdown
    id: importance
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Would improve my workflow
        - Blocking my use of Alaiy OS
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context, mockups, or screenshots about the feature request here.
    validations:
      required: false
